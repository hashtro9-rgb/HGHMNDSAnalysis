name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      # scripts/01_clean.py is NOT run here: it reads data/raw/*.xlsx, which is
      # git-ignored (raw scrape data stays local, per project convention). CI
      # regenerates charts/JSON from the already-committed data/cleaned/*.csv.
      # Run 01_clean.py locally and commit the refreshed data/cleaned/ files
      # whenever new raw data is scraped.
      - name: Run EDA
        run: python scripts/02_eda.py

      - name: Export dashboard JSON
        run: python scripts/03_export_json.py

      - name: Deploy assets/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./assets
