name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      # scripts/02_clean.py is NOT run here: it reads data/raw/latest.xlsx,
      # which is git-ignored (raw scrape data stays local). CI regenerates
      # charts/JSON from the already-committed data/cleaned/*.csv. Run
      # 02_clean.py locally (or via weekly_pipeline.yml's full scrape) and
      # commit the refreshed data/cleaned/ files whenever new raw data lands.
      - name: Run EDA
        run: python scripts/03_eda.py

      - name: Export dashboard JSON
        run: python scripts/04_export_json.py

      # script.js looks for JSON at ../assets/data/ (correct for local dev,
      # where dashboard/ sits next to assets/) with assets/data/ as a fallback.
      # Once deployed, dashboard/ becomes the site root, so ../assets/data/
      # would resolve outside the site -- bundle the data in at that fallback
      # path so the deployed dashboard is self-contained.
      - name: Bundle data into dashboard/
        run: |
          mkdir -p dashboard/assets/data
          cp assets/data/*.json dashboard/assets/data/

      - name: Deploy dashboard/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
